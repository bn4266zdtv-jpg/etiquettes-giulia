<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Étiquettes Prix</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}:root{--brun:#3D2010;--ocre:#C4883A;--chaud:#8B5E3C;--beige:#D4B896;--creme:#FAF6EE;--encre:#1C1712}body{font-family:'DM Sans',sans-serif;background:#F0EBE3;color:var(--encre)}header{background:var(--brun);color:var(--creme);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px}header h1{font-family:'Playfair Display',serif;font-size:15px}header p{font-size:10px;color:var(--beige)}.hbtn{border:none;padding:8px 14px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer}.bp{background:var(--ocre);color:#fff}.bg{background:rgba(255,255,255,.15);color:var(--beige);border:1px solid rgba(255,255,255,.2)}.bd{background:#c0392b;color:#fff}.app{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 52px)}.panel{background:#fff;border-right:1px solid #DDD0BE;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px}.ph{display:flex;align-items:center;justify-content:space-between;padding-bottom:8px;border-bottom:1px solid #DDD0BE}.pt{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--chaud)}.cb{background:var(--ocre);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}.pc{border:1px solid #DDD0BE;border-radius:6px;overflow:hidden;background:var(--creme)}.pch{background:var(--brun);color:var(--beige);padding:6px 9px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:7px}.nm{background:var(--ocre);color:#fff;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}.np{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bd2{background:none;border:none;color:var(--beige);cursor:pointer;font-size:13px;opacity:.5;padding:0 2px}.pcb{padding:9px;display:flex;flex-direction:column;gap:6px}.fi{display:flex;flex-direction:column;gap:2px}.fi label{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--chaud)}.fi input{border:1px solid #DDD0BE;border-radius:3px;padding:5px 8px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--encre);background:#fff;outline:none;width:100%}.fi input:focus{border-color:var(--ocre)}.fr{display:grid;grid-template-columns:1fr 1fr;gap:6px}.tr{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--chaud)}.tr input{accent-color:var(--ocre);width:13px;height:13px}.ba{background:none;border:2px dashed var(--beige);border-radius:6px;padding:10px;width:100%;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--chaud);cursor:pointer;font-weight:600}.ss{border:1px solid #DDD0BE;border-radius:6px;overflow:hidden;margin-bottom:2px}.ssh{background:#f5ede0;padding:7px 11px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--chaud);cursor:pointer;display:flex;justify-content:space-between}.ssb{padding:9px;display:flex;flex-direction:column;gap:6px}.pv{overflow-y:auto;background:#b0a8a0;display:flex;flex-direction:column;align-items:center;padding:18px;gap:10px}.pl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#666;background:#c8c0b8;padding:3px 10px;border-radius:20px}.pa{width:210mm;background:#fff;box-shadow:0 4px 28px rgba(0,0,0,.3);padding:10mm;display:grid;grid-template-columns:repeat(4,1fr);gap:3mm;align-content:start}.et{width:100%;aspect-ratio:6/4;border:1pt solid var(--brun);background:var(--creme);display:flex;flex-direction:column;overflow:hidden}.et-t{background:var(--brun);width:100%;padding:1mm 2mm;display:flex;align-items:center;justify-content:center;flex-shrink:0}.et-t span{font-family:'Cormorant Garamond',serif;font-size:3.5pt;letter-spacing:.14em;color:var(--beige);text-transform:uppercase;white-space:nowrap}.et-b{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1mm 2mm;gap:.7mm;text-align:center}.et-n{font-family:'Playfair Display',serif;font-size:8pt;color:var(--brun);line-height:1.1;font-weight:700}.et-s{font-family:'Cormorant Garamond',serif;font-size:5pt;font-style:italic;color:var(--chaud)}.et-f{width:45%;height:.4pt;background:var(--ocre);flex-shrink:0}.et-p{font-family:'Playfair Display',serif;font-size:12pt;color:var(--ocre);font-weight:700;line-height:1}.et-u{font-family:'Cormorant Garamond',serif;font-size:4.5pt;font-style:italic;color:var(--chaud)}.et-bot{background:var(--ocre);width:100%;height:1.5mm;flex-shrink:0}.et-e{border:1pt dashed #ddd;background:#f9f7f4;opacity:.3}.toast{position:fixed;bottom:20px;right:20px;background:var(--brun);color:var(--creme);padding:9px 16px;border-radius:6px;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,.3);transform:translateY(60px);opacity:0;transition:all .3s;z-index:999;border-left:3px solid var(--ocre)}.toast.show{transform:translateY(0);opacity:1}@media print{@page{size:A4 portrait;margin:0}body{background:none}header,.panel,.pl,.toast{display:none!important}.app{display:block;height:auto}.pv{background:none;padding:0;margin:0;display:block}.pa{box-shadow:none;margin:0;width:210mm;padding:10mm}.et-e{display:none}}</style></head><body><header><div><h1>🏷️ Étiquettes Prix</h1><p id="snd">Les Petits Pains de Giulia</p></div><div style="display:flex;gap:7px"><button class="hbtn bg" onclick="exportData()">📤 Exporter</button><button class="hbtn bg" onclick="document.getElementById('if').click()">📥 Importer</button><input type="file" id="if" accept=".json" style="display:none" onchange="importData(event)"><button class="hbtn bp" onclick="window.print()">🖨️ Imprimer</button></div></header><div class="toast" id="toast"></div><div class="app"><div class="panel" id="panel"><div class="ss"><div class="ssh" onclick="toggleSS()">⚙️ Boutique <span id="sa">▾</span></div><div class="ssb" id="ssb"><div class="fi"><label>Nom sur les étiquettes</label><input type="text" id="sni" value="Les Petits Pains de Giulia" oninput="updateSN(this.value)"></div></div></div><div class="ph"><div class="pt">Mes produits</div><span class="cb" id="cbadge">0</span></div><div id="pl"></div><button class="ba" onclick="addP()">+ Ajouter un produit</button><button class="hbtn bd" onclick="clearAll()" style="margin-top:4px;font-size:11px;padding:6px">🗑️ Tout effacer</button></div><div class="pv"><div class="pl">Aperçu A4 · 4 colonnes · 6×4 cm</div><div class="pa" id="pa"></div></div></div><script>let sn=localStorage.getItem('eq_sn')||'Les Petits Pains de Giulia';let ps=JSON.parse(localStorage.getItem('eq_ps')||'null')||[{id:1,n:'Brownie',s:'Chocolat & Framboise',p:'2,80',u:'la pièce',v:true},{id:2,n:'Doughnut',s:'Façon Lion',p:'3,00',u:'la pièce',v:true},{id:3,n:'Meringues',s:'Saveurs du moment',p:'3,50',u:'sachet × 8',v:true},{id:4,n:'Chou Chantilly',s:'Fait maison',p:'3,60',u:'la pièce',v:true},{id:5,n:'Amaretti',s:'Biscuits italiens',p:'5,50',u:'sachet × 12',v:true}];let nid=Math.max(...ps.map(p=>p.id),0)+1;let sso=true;function sv(){localStorage.setItem('eq_ps',JSON.stringify(ps));localStorage.setItem('eq_sn',sn)}function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}function updateSN(v){sn=v;document.getElementById('snd').textContent=v;sv();rp()}function toggleSS(){sso=!sso;document.getElementById('ssb').style.display=sso?'':'none';document.getElementById('sa').textContent=sso?'▾':'▸'}function addP(){ps.push({id:nid++,n:'Nouveau produit',s:'',p:'0,00',u:'la pièce',v:true});sv();render();setTimeout(()=>{const el=document.getElementById('panel');el.scrollTop=el.scrollHeight},50)}function delP(id){if(!confirm('Supprimer ?'))return;ps=ps.filter(p=>p.id!==id);sv();render();toast('Supprimé')}function clearAll(){if(!confirm('Effacer tous les produits ?'))return;ps=[];nid=1;sv();render();toast('Effacé')}function upP(id,f,v){const p=ps.find(p=>p.id===id);if(!p)return;p[f]=v;sv();rp();if(f==='n'){const el=document.querySelector('[data-np="'+id+'"]');if(el)el.textContent=v||'Sans nom'}document.getElementById('cbadge').textContent=ps.filter(p=>p.v).length}function exportData(){const b=new Blob([JSON.stringify({sn,ps},null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='etiquettes.json';a.click();URL.revokeObjectURL(u);toast('✅ Exporté!')}function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.ps&&Array.isArray(d.ps)){ps=d.ps;nid=Math.max(...ps.map(p=>p.id),0)+1;if(d.sn){sn=d.sn;document.getElementById('sni').value=sn;document.getElementById('snd').textContent=sn}sv();render();toast('✅ '+ps.length+' produits!')}}catch{toast('❌ Erreur')}};r.readAsText(f);e.target.value=''}function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function renderPanel(){const l=document.getElementById('pl');l.innerHTML='';document.getElementById('cbadge').textContent=ps.filter(p=>p.v).length;ps.forEach((p,i)=>{const c=document.createElement('div');c.className='pc';c.innerHTML=`<div class="pch"><div class="nm">${i+1}</div><div class="np" data-np="${p.id}">${esc(p.n)}</div><button class="bd2" onclick="delP(${p.id})">✕</button></div><div class="pcb"><div class="fi"><label>Nom</label><input type="text" value="${esc(p.n)}" oninput="upP(${p.id},'n',this.value)"></div><div class="fi"><label>Sous-titre</label><input type="text" value="${esc(p.s)}" oninput="upP(${p.id},'s',this.value)"></div><div class="fr"><div class="fi"><label>Prix €</label><input type="text" value="${esc(p.p)}" oninput="upP(${p.id},'p',this.value)"></div><div class="fi"><label>Unité</label><input type="text" value="${esc(p.u)}" oninput="upP(${p.id},'u',this.value)"></div></div><div class="tr"><input type="checkbox" id="v${p.id}" ${p.v?'checked':''} onchange="upP(${p.id},'v',this.checked)"><label for="v${p.id}">Afficher</label></div></div>`;l.appendChild(c)})}function rp(){const pg=document.getElementById('pa');pg.innerHTML='';const vis=ps.filter(p=>p.v);const cells=vis.length===0?4:Math.ceil(vis.length/4)*4;for(let i=0;i<cells;i++){const p=vis[i];const el=document.createElement('div');if(!p){el.className='et et-e';pg.appendChild(el);continue}el.className='et';el.innerHTML=`<div class="et-t"><span>${esc(sn)}</span></div><div class="et-b"><div class="et-n">${esc(p.n)}</div>${p.s?'<div class="et-s">'+esc(p.s)+'</div>':''}<div class="et-f"></div><div class="et-p">${esc(p.p)} €</div>${p.u?'<div class="et-u">'+esc(p.u)+'</div>':''}</div><div class="et-bot"></div>`;pg.appendChild(el)}}function render(){renderPanel();rp()}document.getElementById('sni').value=sn;document.getElementById('snd').textContent=sn;render();</script></body></html>
